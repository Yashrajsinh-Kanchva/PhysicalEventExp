<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | StadiumFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            background-image: 
                radial-gradient(circle at top right, rgba(0, 229, 255, 0.1), transparent 40%),
                radial-gradient(circle at bottom left, rgba(157, 0, 255, 0.1), transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body class="animate-fade-in flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full">
        <div class="text-center mb-12">
            <div class="w-16 h-16 bg-accent rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(0,229,255,0.4)] rotate-3">
                <i class="fa-solid fa-bolt-lightning text-dark text-3xl"></i>
            </div>
            <h1 class="text-5xl font-black text-white tracking-tighter mb-3">Stadium<span class="text-accent">Flow</span></h1>
            <p class="text-muted text-sm font-bold uppercase tracking-[0.2em] opacity-80">Next-Gen Venue Intelligence</p>
        </div>

        <div class="glass-panel p-10 space-y-8">
            <div class="space-y-3">
                <h2 class="text-2xl font-black text-white tracking-tight">Welcome Back</h2>
                <p class="text-[0.65rem] text-muted uppercase tracking-[0.3em] font-black">Select access protocol</p>
            </div>

            <button id="googleLoginBtn" class="w-full bg-white text-black font-black py-4 rounded-xl flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-95 transition-all shadow-xl">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5" alt="Google">
                Sign in with Google
            </button>

            <div class="relative flex py-3 items-center">
                <div class="flex-grow border-t border-white/5"></div>
                <span class="flex-shrink mx-6 text-[10px] text-muted font-black uppercase tracking-[0.4em]">OR</span>
                <div class="flex-grow border-t border-white/5"></div>
            </div>

            <button id="guestBtn" class="btn btn-secondary w-full py-4 font-black tracking-[0.2em]">
                Continue as Guest
            </button>

            <div class="pt-4 border-t border-white/5">
                <p class="text-[0.6rem] text-center text-muted font-bold leading-relaxed uppercase tracking-[0.15em]">
                    By continuing, you agree to our <span class="text-accent cursor-pointer hover:underline">Terms</span> and <span class="text-accent cursor-pointer hover:underline">Security Protocol</span>.
                </p>
            </div>
        </div>
    </div>


    <script type="module">
        import { loginWithGoogle } from '../js/auth.js';
        
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            const user = await loginWithGoogle();
            if (user) window.location.href = '/index.html';
        });

        document.getElementById('guestBtn').addEventListener('click', () => {
            sessionStorage.setItem('sf_guest_mode', 'true');
            window.location.href = '/index.html';
        });
    </script>
</body>
</html>
