<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heatmap | StadiumFlow</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/heatmap.css">
</head>
<body class="pt-32 pb-16 min-h-screen flex flex-col">
    <!-- Navbar Placeholder -->
    <div id="navbar"></div>

    <main class="sf-container animate-fade-in flex-1 flex flex-col">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-8">
            <div>
                <h1 class="text-5xl md:text-6xl font-black mb-3 tracking-tighter">Thermal <span class="text-accent">Topology</span></h1>
                <p class="text-muted font-bold uppercase tracking-[0.3em] text-[0.7rem] opacity-80">Live Spatial Crowd Distribution & Flow Analytics</p>
            </div>
            <div class="glass-panel px-8 py-4 rounded-2xl flex items-center gap-6 bg-white/[0.03]">
                <div id="liveClock" class="font-mono font-bold text-2xl text-white tracking-widest">00:00:00</div>
            </div>
        </header>

        <!-- Main Heatmap Display -->
        <div class="flex-1 flex flex-col items-center justify-center p-4">
            <div class="w-full max-w-[1100px] flex justify-center items-center">
                <div class="glass-panel p-2 md:p-4 shadow-2xl relative overflow-visible flex justify-center items-center bg-black/40 border-white/10 w-full aspect-[1000/850]">
                     <canvas id="heatmapCanvas" width="1000" height="850" class="stadium-map w-full h-full object-contain"></canvas>
                     <div id="tooltip"></div>
                </div>
            </div>
        </div>

        <!-- Legend Overlay -->
        <div class="mt-12 flex justify-center">
            <div class="glass-panel px-10 py-5 flex flex-wrap justify-center gap-10 items-center border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-2.5 h-2.5 rounded-full bg-[#10b981] shadow-[0_0_10px_#10b981]"></div>
                    <span class="text-[0.65rem] font-black tracking-[0.2em] text-muted uppercase">Optimal Flow</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-2.5 h-2.5 rounded-full bg-[#f59e0b] shadow-[0_0_10px_#f59e0b]"></div>
                    <span class="text-[0.65rem] font-black tracking-[0.2em] text-muted uppercase">Moderate Density</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-2.5 h-2.5 rounded-full bg-[#ef4444] shadow-[0_0_10px_#ef4444]"></div>
                    <span class="text-[0.65rem] font-black tracking-[0.2em] text-muted uppercase">Dense / Congested</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer"></div>


    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
