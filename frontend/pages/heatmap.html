<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heatmap | StadiumFlow</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/heatmap.css">
</head>
<body class="pt-24 pb-10 min-h-screen flex flex-col">
    <!-- Navbar Placeholder -->
    <div id="navbar"></div>

    <main class="container animate-fade-in flex-1 flex flex-col">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold mb-1">Thermal Topology</h1>
                <p class="text-secondary font-medium uppercase tracking-widest text-[0.7rem] opacity-70">Live Spatial Crowd Distribution</p>
            </div>
            <div class="glass-panel px-6 py-3 rounded-2xl flex items-center gap-4 bg-white/[0.02]">
                <div id="liveClock" class="font-mono font-black text-xl text-white">--:--:--</div>
            </div>
        </header>

        <!-- Main Heatmap Display -->
        <div class="flex-1 flex flex-col items-center justify-center">
            <div class="stadium-wrapper w-full max-w-[1100px] flex justify-center items-center">
                <div class="map-container stadium-container glass-panel shadow-[0_40px_100px_rgba(0,0,0,0.7)] p-0 relative overflow-visible group flex justify-center items-center bg-transparent border-white/[0.05]">
                     <canvas id="heatmapCanvas" width="1000" height="850" class="stadium-map"></canvas>
                     <div id="tooltip"></div>
                </div>
            </div>
        </div>

        <!-- Legend Overlay -->
        <div class="mt-8 flex justify-center">
            <div class="glass-panel p-4 md:px-8 flex flex-row gap-8 items-center border-white/[0.05]">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-[#00ff80] shadow-[0_0_10px_#00ff80]"></div>
                    <span class="text-[0.65rem] font-bold tracking-widest text-slate-400 uppercase">Optimal Flow</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-[#ffcc00] shadow-[0_0_10px_#ffcc00]"></div>
                    <span class="text-[0.65rem] font-bold tracking-widest text-slate-400 uppercase">Moderate</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-[#ff2a55] shadow-[0_0_10px_#ff2a55]"></div>
                    <span class="text-[0.65rem] font-bold tracking-widest text-slate-400 uppercase">Congested</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer"></div>

    <script src="../js/layout.js"></script>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
