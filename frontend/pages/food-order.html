<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Order | StadiumFlow</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="pt-32 pb-16">
    <!-- Navbar Placeholder -->
    <div id="navbar"></div>

    <main class="sf-container animate-fade-in">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-8">
            <div>
                <h1 class="text-5xl md:text-6xl font-black mb-3 tracking-tighter">Concession <span class="text-accent">Services</span></h1>
                <p class="text-muted font-bold uppercase tracking-[0.3em] text-[0.7rem] opacity-80">Pre-order for Express In-Seat Pickup & Queue-less Checkout</p>
            </div>
            <button class="cart-toggle btn px-8 py-4 rounded-2xl flex items-center gap-6 bg-white/[0.03] border-accent/20 hover:border-accent group">
                <div class="relative">
                    <i class="fa-solid fa-cart-shopping text-accent text-2xl"></i>
                    <span class="cart-badge absolute -top-2 -right-3 bg-red-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#02040a] animate-bounce">0</span>
                </div>
                <span class="text-sm font-black text-white tracking-widest uppercase">VIEW CART</span>
            </button>
        </header>

        <!-- Category Filters -->
        <div class="flex flex-wrap gap-4 mb-16">
            <button data-category="all" class="cat-filter active px-8 py-3.5 rounded-xl border border-accent/40 bg-accent/10 text-accent text-[0.7rem] font-black uppercase tracking-[0.2em] transition-all">All Items</button>
            <button data-category="Mains" class="cat-filter px-8 py-3.5 rounded-xl border border-white/5 bg-white/[0.02] text-muted text-[0.7rem] font-black uppercase tracking-[0.2em] hover:text-white hover:border-white/20 transition-all">Mains</button>
            <button data-category="Snacks" class="cat-filter px-8 py-3.5 rounded-xl border border-white/5 bg-white/[0.02] text-muted text-[0.7rem] font-black uppercase tracking-[0.2em] hover:text-white hover:border-white/20 transition-all">Snacks</button>
            <button data-category="Drinks" class="cat-filter px-8 py-3.5 rounded-xl border border-white/5 bg-white/[0.02] text-muted text-[0.7rem] font-black uppercase tracking-[0.2em] hover:text-white hover:border-white/20 transition-all">Drinks</button>
        </div>

        <!-- Product Grid -->
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Items dynamically injected by food.js -->
        </div>
    </main>

    <!-- Cart Drawer -->
    <div id="cartDrawerOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[2000] hidden transition-all duration-500">
        <div id="cartDrawer" class="absolute right-0 top-0 h-full w-full max-w-md bg-[#02040a] border-l border-white/10 shadow-[0_0_100px_rgba(0,0,0,0.8)] flex flex-col pt-32 animate-slide-in">
            <div class="px-10 flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black tracking-tighter">Your Order</h2>
                <button class="cart-toggle text-muted hover:text-white text-2xl transition-colors">✕</button>
            </div>
            
            <div id="cartItemsContainer" class="flex-1 overflow-y-auto px-10 space-y-8">
                <!-- Cart items list injected here -->
            </div>

            <div class="p-10 border-t border-white/5 bg-white/[0.01] space-y-6">
                <div class="flex justify-between items-center">
                    <span class="text-muted font-black uppercase tracking-[0.2em] text-[0.6rem]">Estimated Total</span>
                    <span id="cartTotal" class="text-4xl font-black text-white tracking-tighter">₹0.00</span>
                </div>
                <button onclick="checkout()" class="btn btn-primary w-full py-5 text-xs font-black shadow-[0_15px_30px_rgba(0,229,255,0.25)]">
                    CONFIRM CHECKOUT <i class="fa-solid fa-rocket ml-3"></i>
                </button>
                <div class="flex items-center justify-center gap-3">
                    <span class="w-1.5 h-1.5 bg-accent rounded-full animate-pulse"></span>
                    <p class="text-[0.6rem] text-center text-muted font-black uppercase tracking-[0.25em]">Pickup at Section B - Node 4</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer"></div>


    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
